<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stayko Nenov - Портфолио</title>
    
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header" id="header">
        <nav class="nav container">
            <a href="#" class="nav__logo txt-fx slide-up">Stayko Nenov</a>
            
            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list grid">
                    <li class="nav__item"><a href="#home" class="nav__link active-link">Начало</a></li>
                    <li class="nav__item"><a href="#about" class="nav__link">За мен</a></li>
                    <li class="nav__item"><a href="#skills" class="nav__link">Умения</a></li>
                    <li class="nav__item"><a href="#portfolio" class="nav__link">Портфолио</a></li>
                    <li class="nav__item"><a href="#contact" class="nav__link">Контакт</a></li>
                </ul>
                <i class="uil uil-times nav__close" id="nav-close"></i>
            </div>
            
            <div class="nav__btns">
                <i class="uil uil-moon change-theme" id="theme-button"></i>
                
                <div class="nav__toggle" id="nav-toggle">
                    <i class="uil uil-apps"></i>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        
        <section class="home section" id="home">
            <div class="home__container container grid reveal-top">
                <h1 class="home__title txt-fx fade-right">Здравейте, аз съм Стайко</h1>
                <p class="home__description">UX/UI дизайнер, специализиран в B2B е-търговия и дизайн системи.</p>
            </div>
        </section>

        <section class="skills section" id="skills">
            <h2 class="section__title reveal-top">Професионални умения</h2>
            
            <div class="skills__container container grid reveal-top">
                <div class="skills__content skills__close">
                    <div class="skills__header">
                        <i class="uil uil-brackets-curly skills__icon"></i>
                        <div>
                            <h1 class="skills__title">Frontend Development</h1>
                        </div>
                        <i class="uil uil-angle-down skills__arrow"></i>
                    </div>
                    <div class="skills__list grid">
                        <div class="skills__data"><div class="skills__titles"><h3 class="skills__name">HTML/CSS</h3></div></div>
                        <div class="skills__data"><div class="skills__titles"><h3 class="skills__name">JavaScript</h3></div></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <a href="#" class="scrollup" id="scroll-up">
        <i class="uil uil-arrow-up scrollup__icon"></i>
    </a>

    <script src="assets/css/swiper-bundle.min.js"></script>
    
    <script src="assets/js/main.js"></script>
</body>
</html>
